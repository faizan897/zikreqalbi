<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Zikr-e-Qalbi">
<meta name="theme-color" content="#0f1117">
<title>Zikr-e-Qalbi</title>
<style>
:root{--bg:#0f1117;--bg2:#181c27;--bg3:#1f2438;--bg4:#252a42;--text:#e8eaf0;--text2:#8a90a8;--text3:#4a5070;--accent:#7c6af7;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--gold:#c8a84b;--red:#e05050;--green:#4caf87;--r:12px;--rl:18px;--rxl:24px;--f:'Georgia','Times New Roman',serif;--fu:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fu);overscroll-behavior:none}
body{background-image:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(124,106,247,0.12) 0%,transparent 70%),radial-gradient(ellipse 40% 30% at 80% 80%,rgba(200,168,75,0.06) 0%,transparent 60%);min-height:100vh}
.app{max-width:430px;margin:0 auto;padding:0 0 40px;min-height:100vh}

/* Header */
.hdr{text-align:center;padding:22px 20px 10px;position:relative}
.hdr::after{content:'';display:block;width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:10px auto 0}
.at{font-family:var(--f);font-size:20px;color:var(--gold);letter-spacing:1px}
.hdr h1{font-family:var(--f);font-size:22px;font-weight:normal;color:var(--text);letter-spacing:0.5px;margin-top:3px}
.hdr p{font-size:10px;color:var(--text3);margin-top:4px;letter-spacing:1.5px;text-transform:uppercase}

/* Lang + mode bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:4px 16px 10px;gap:8px}
.lw{position:relative;flex:1}
.ls{appearance:none;-webkit-appearance:none;background:var(--bg2);border:0.5px solid var(--border2);color:var(--gold);padding:6px 26px 6px 10px;border-radius:8px;font-size:12px;font-family:var(--fu);cursor:pointer;outline:none;width:100%}
.ls option{background:var(--bg2);color:var(--text)}
.la{position:absolute;right:8px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--gold);font-size:10px}
.admin-btn{padding:7px 14px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:8px;font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:var(--fu)}
.admin-btn.active{color:var(--gold);border-color:var(--gold)}

/* Live banner */
.live-banner{margin:0 16px 12px;border-radius:var(--rl);padding:12px 16px;display:none;position:relative;overflow:hidden}
.live-banner.on{display:flex;align-items:center;gap:10px;background:rgba(124,106,247,0.15);border:0.5px solid var(--accent)}
.live-dot{width:10px;height:10px;border-radius:50%;background:var(--red);flex-shrink:0;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.85)}}
.live-text{flex:1;font-size:13px;font-weight:500;color:var(--text)}
.live-sub{font-size:10px;color:var(--text2);margin-top:1px}
.join-btn{padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--fu);box-shadow:0 2px 10px rgba(124,106,247,0.4)}

/* Live active item display (mureed view) */
.live-active{margin:0 16px 12px;border-radius:var(--rxl);padding:20px 16px;text-align:center;background:var(--bg2);border:0.5px solid var(--border);position:relative;overflow:hidden;display:none}
.live-active::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),var(--gold),var(--accent),transparent)}
.la-label{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.la-arabic{font-family:var(--f);font-size:26px;color:var(--gold);letter-spacing:1px;margin-bottom:4px}
.la-name{font-size:18px;font-weight:500;color:var(--text);margin-bottom:8px}
.la-color-dot{width:18px;height:18px;border-radius:50%;margin:0 auto 6px;animation:glow-pulse 2s infinite}
@keyframes glow-pulse{0%,100%{transform:scale(1);box-shadow:0 0 8px currentColor}50%{transform:scale(1.2);box-shadow:0 0 18px currentColor}}
.la-detail{font-size:11px;color:var(--text2);line-height:1.6}
.la-ayat{font-family:var(--f);font-size:15px;color:var(--gold);direction:rtl;text-align:right;margin-top:8px;line-height:1.7}
.la-ayat-ref{font-size:9px;color:var(--text3);margin-top:2px}
.la-trans{font-size:11px;color:var(--text2);font-style:italic;margin-top:4px;line-height:1.5}

/* Tabs */
.tabs{display:flex;margin:0 16px 12px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:3px;gap:3px}
.tab{flex:1;padding:9px 6px;font-size:13px;font-weight:500;text-align:center;cursor:pointer;background:transparent;border:none;color:var(--text2);border-radius:9px;transition:all 0.2s;font-family:var(--fu)}
.tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 12px rgba(124,106,247,0.35)}
.slbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;margin:10px 0 6px 20px}
.syncr{display:flex;align-items:center;gap:10px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:10px 14px;margin:0 16px 10px}
.syncr input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--accent);flex-shrink:0}
.syncr label{font-size:12px;color:var(--text2);cursor:pointer;flex:1}

/* Item rows */
.ir{display:flex;align-items:center;gap:9px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:9px 12px;margin:0 16px 6px;transition:all 0.25s}
.ir.active{border-color:var(--accent);background:rgba(124,106,247,0.12)}
.ir.done{opacity:0.38}
.ir.dis{opacity:0.3}
.ir.live-current{border-color:var(--gold);background:rgba(200,168,75,0.1);animation:row-glow 2s infinite}
@keyframes row-glow{0%,100%{border-color:var(--gold)}50%{border-color:rgba(200,168,75,0.4)}}
.idot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.ii{flex:1;min-width:0;cursor:pointer}
.in{font-size:13px;font-weight:500;color:var(--text)}
.iar{font-family:var(--f);font-size:13px;color:var(--gold);opacity:0.85;margin-left:5px}
.isb{font-size:10px;color:var(--text3);margin-top:2px}
.ims{display:flex;align-items:center;gap:4px}
.mb{width:22px;height:22px;border-radius:50%;border:0.5px solid var(--border2);background:var(--bg3);font-size:15px;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;font-family:var(--fu);line-height:1}
.mb:disabled{opacity:0.3;cursor:default}
.mv{font-size:13px;font-weight:500;min-width:22px;text-align:center;color:var(--text)}
.et2{display:flex;align-items:center;gap:4px;flex-shrink:0}
.et2 input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--accent)}
.et2 label{font-size:10px;color:var(--text2);cursor:pointer;min-width:22px}

/* Bottom bar */
.bb2{padding:12px 16px 0}
.tot{text-align:center;font-size:12px;color:var(--text2);margin-bottom:12px}
.tot .et{color:var(--gold)}
.bbn{display:block;width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:var(--rl);font-size:15px;font-weight:600;cursor:pointer;font-family:var(--fu);letter-spacing:0.5px;box-shadow:0 4px 20px rgba(124,106,247,0.4)}
.bbn:active{transform:scale(0.98)}

/* Session view */
.tc{margin:0 16px 12px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rxl);padding:20px 16px 16px;text-align:center;position:relative;overflow:hidden}
.tc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),var(--gold),var(--accent),transparent)}
.cn{font-size:12px;color:var(--text2);margin-bottom:6px;letter-spacing:0.5px}
.ca{font-family:var(--f);font-size:22px;color:var(--gold);margin-bottom:10px;letter-spacing:1px}
.lcw{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px}
.lcd{width:22px;height:22px;border-radius:50%;flex-shrink:0}
.lcl{font-size:12px;color:var(--text2)}
.lcn{font-size:13px;font-weight:500}
.clk{font-size:52px;font-weight:300;color:var(--text);letter-spacing:4px;font-variant-numeric:tabular-nums;font-family:var(--fu)}
.pt{height:4px;background:var(--bg4);border-radius:2px;margin:12px 0 7px}
.pf{height:100%;border-radius:2px;transition:width 0.8s linear,background 0.4s}
.pl{font-size:11px;color:var(--text3)}
.ed{font-size:11px;color:var(--gold);margin-top:4px;opacity:0.85}
.dc{margin:0 16px 12px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rl);overflow:hidden}
.dr{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;border-bottom:0.5px solid var(--border)}
.dr:last-child{border-bottom:none}
.di{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.dl{font-size:10px;color:var(--text3);margin-bottom:2px;letter-spacing:0.3px}
.dv{font-size:13px;font-weight:500;color:var(--text)}
.dvsm{font-size:11px;color:var(--text2);line-height:1.5}
.ayr{font-family:var(--f);font-size:17px;color:var(--gold);line-height:1.7;direction:rtl;text-align:right;margin-bottom:4px}
.ayrf{font-size:10px;color:var(--text3);margin-bottom:4px}
.ayt{font-size:11px;color:var(--text2);line-height:1.5;font-style:italic}
.dots{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin:0 16px 12px;padding:10px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--bg4);transition:all 0.3s}
.dot.done{background:#4caf87}
.sc{display:flex;gap:8px;justify-content:center;margin:0 16px 14px}
.sb{flex:1;padding:11px 6px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;color:var(--text);font-family:var(--fu)}
.sb:active{transform:scale(0.97)}
.sb.pr{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 12px rgba(124,106,247,0.3)}
.sl2{padding:0 16px}
.fin{text-align:center;padding:40px 20px;display:none}
.fin .ab{font-family:var(--f);font-size:42px;color:var(--gold);margin-bottom:12px;text-shadow:0 0 30px rgba(200,168,75,0.3)}
.fin h2{font-size:18px;font-weight:400;color:var(--text);margin-bottom:8px}
.fin p{font-size:13px;color:var(--text2);line-height:1.7;white-space:pre-line}
.sec{display:none}.sec.vis{display:block}

/* Admin panel */
.admin-panel{padding:0 16px}
.ap-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ap-title{font-size:16px;font-weight:500;color:var(--text)}
.ap-status{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:500}
.ap-status.live{background:rgba(224,80,80,0.2);color:var(--red);border:0.5px solid var(--red)}
.ap-status.off{background:var(--bg2);color:var(--text3);border:0.5px solid var(--border)}
.session-type-row{display:flex;gap:8px;margin-bottom:12px}
.stype-btn{flex:1;padding:10px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);font-family:var(--fu);text-align:center;transition:all 0.2s}
.stype-btn.selected{background:rgba(200,168,75,0.15);border-color:var(--gold);color:var(--gold)}
.ap-start{display:block;width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:var(--rl);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--fu);margin-bottom:8px;letter-spacing:0.5px}
.ap-end{display:block;width:100%;padding:13px;background:rgba(224,80,80,0.2);color:var(--red);border:0.5px solid var(--red);border-radius:var(--rl);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--fu);margin-bottom:12px;letter-spacing:0.5px;display:none}
.ap-grid-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;margin:8px 0 6px}
.ap-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.ap-item{padding:10px 12px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.ap-item:active{transform:scale(0.97)}
.ap-item.current{border-color:var(--gold);background:rgba(200,168,75,0.12)}
.ap-item.current::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold)}
.ap-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
.ap-name{font-size:12px;font-weight:500;color:var(--text);display:inline;vertical-align:middle}
.ap-ar{font-family:var(--f);font-size:11px;color:var(--gold);opacity:0.7;display:block;margin-top:3px;text-align:right}
.mic-row{display:flex;align-items:center;gap:10px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.mic-btn{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
.mic-btn.off{background:var(--bg3)}
.mic-btn.on{background:var(--red);box-shadow:0 0 16px rgba(224,80,80,0.5);animation:mic-pulse 1.5s infinite}
@keyframes mic-pulse{0%,100%{box-shadow:0 0 16px rgba(224,80,80,0.5)}50%{box-shadow:0 0 28px rgba(224,80,80,0.8)}}
.mic-info{flex:1}
.mic-label{font-size:13px;font-weight:500;color:var(--text)}
.mic-sub{font-size:10px;color:var(--text2);margin-top:2px}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.mb2{background:var(--bg2);border-radius:var(--rxl) var(--rxl) 0 0;width:100%;max-width:430px;max-height:85vh;overflow-y:auto;padding:0 0 32px;border-top:0.5px solid var(--border2)}
.mh2{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:12px auto 16px}
.mhdr{display:flex;align-items:center;gap:10px;padding:0 16px 12px;border-bottom:0.5px solid var(--border)}
.mdo{width:16px;height:16px;border-radius:50%;flex-shrink:0}
.mti{font-size:16px;font-weight:500;color:var(--text);flex:1}
.mar{font-family:var(--f);font-size:15px;color:var(--gold);margin-top:2px}
.mc{width:28px;height:28px;border-radius:50%;background:var(--bg3);border:0.5px solid var(--border2);color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* PIN overlay */
.pin-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:center;justify-content:center}
.pin-box{background:var(--bg2);border-radius:var(--rxl);padding:28px 24px;width:300px;border:0.5px solid var(--border2);text-align:center}
.pin-title{font-size:16px;font-weight:500;color:var(--text);margin-bottom:6px}
.pin-sub{font-size:12px;color:var(--text2);margin-bottom:16px}
.pin-input{width:100%;padding:12px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--r);color:var(--text);font-size:20px;text-align:center;letter-spacing:8px;font-family:var(--fu);outline:none;margin-bottom:12px}
.pin-input:focus{border-color:var(--accent)}
.pin-submit{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--fu);margin-bottom:8px}
.pin-cancel{width:100%;padding:10px;background:transparent;color:var(--text2);border:0.5px solid var(--border);border-radius:var(--r);font-size:13px;cursor:pointer;font-family:var(--fu)}
.pin-error{font-size:12px;color:var(--red);margin-bottom:8px;display:none}

/* Voice indicator */
.voice-bar{display:flex;align-items:center;gap:6px;padding:8px 14px;background:rgba(224,80,80,0.1);border-radius:var(--r);margin:0 16px 10px;border:0.5px solid rgba(224,80,80,0.3);display:none}
.voice-bar.on{display:flex}
.vb-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:pulse 1s infinite}
.vb-txt{font-size:11px;color:var(--red)}
</style>
</head>
<body>
<div class="app">

<!-- PIN Overlay -->
<div id="pin-overlay" class="pin-overlay" style="display:none">
  <div class="pin-box">
    <div class="pin-title" id="pin-title">Enter Access PIN</div>
    <div class="pin-sub" id="pin-sub">Enter your 6-digit PIN</div>
    <div class="pin-error" id="pin-error">Incorrect PIN. Try again.</div>
    <input type="password" inputmode="numeric" maxlength="6" class="pin-input" id="pin-input" placeholder="••••••">
    <button class="pin-submit" onclick="checkPin()">Enter</button>
    <button class="pin-cancel" onclick="cancelPin()">Cancel</button>
  </div>
</div>

<!-- Info Modal -->
<div id="mo" style="display:none" class="mo" onclick="cmo(event)">
  <div class="mb2">
    <div class="mh2"></div>
    <div class="mhdr">
      <div class="mdo" id="mdo"></div>
      <div style="flex:1;min-width:0"><div class="mti" id="mti"></div><div class="mar" id="mar2"></div></div>
      <button class="mc" onclick="document.getElementById('mo').style.display='none'">✕</button>
    </div>
    <div id="mb3" style="padding-top:4px"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="sv">
  <div class="hdr">
    <div class="at">ذکرِ قلبی</div>
    <h1 id="ht">Zikr-e-Qalbi</h1>
    <p id="hs">Silsila Naqshbandia Owaisia</p>
  </div>

  <div class="topbar">
    <div class="lw">
      <select class="ls" id="lsel" onchange="setLang(this.value)">
        <option value="en">🌐 English</option>
        <option value="ur">🌐 اردو</option>
        <option value="ta">🌐 தமிழ்</option>
      </select>
      <span class="la">▼</span>
    </div>
    <button class="admin-btn" id="admin-toggle-btn" onclick="handleAdminBtn()">Admin</button>
  </div>

  <!-- Live banner — shown when session is active, hidden for admin/helper -->
  <div class="live-banner" id="live-banner">
    <div class="live-dot"></div>
    <div>
      <div class="live-text" id="live-text">Live Zikr in Progress</div>
      <div class="live-sub" id="live-sub">Tap Join to participate</div>
    </div>
    <button class="join-btn" id="join-btn" onclick="joinLive()">Join</button>
  </div>

  <!-- Voice bar (listener) -->
  <div class="voice-bar" id="voice-bar">
    <div class="vb-dot"></div>
    <div class="vb-txt" id="voice-bar-txt">Hazrat ji is speaking live</div>
  </div>

  <!-- Live active item display (mureed joined view) -->
  <div class="live-active" id="live-active">
    <div class="la-label" id="la-label">Currently</div>
    <div class="la-color-dot" id="la-cdot"></div>
    <div class="la-arabic" id="la-ar"></div>
    <div class="la-name" id="la-nm"></div>
    <div class="la-detail" id="la-det"></div>
    <div class="la-ayat" id="la-ayat"></div>
    <div class="la-ayat-ref" id="la-ayat-ref"></div>
    <div class="la-trans" id="la-trans"></div>
    <div id="live-dur" style="font-size:11px;color:var(--text3);margin-top:10px;letter-spacing:0.5px"></div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="admin-panel" style="display:none">
    <div class="admin-panel">
      <div class="ap-header">
        <div class="ap-title" id="ap-title">Admin Panel</div>
        <div class="ap-status off" id="ap-status">Offline</div>
      </div>

      <!-- Mic control (admin only) -->
      <div class="mic-row" id="mic-row" style="display:none">
        <button class="mic-btn off" id="mic-btn" onclick="toggleMic()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:#fff">

var FB_URL='https://zikr-e-qalbi-default-rtdb.asia-southeast1.firebasedatabase.app';

function makeRef(path){
  return {
    on: function(event, cb){
      var url = FB_URL + path + '.json';
      function connect(){
        try{
          var es = new EventSource(url);
          es.addEventListener('put', function(e){
            try{var d=JSON.parse(e.data); cb({val:function(){return d.data;}});}catch(x){}
          });
          es.addEventListener('patch', function(e){
            try{var d=JSON.parse(e.data); cb({val:function(){return d.data;}});}catch(x){}
          });
          es.onerror = function(){es.close(); setTimeout(connect, 3000);};
        }catch(x){
          var last = null;
          setInterval(function(){
            fetch(url).then(function(r){return r.json();}).then(function(d){
              var s = JSON.stringify(d);
              if(s !== last){last = s; cb({val:function(){return d;}});}
            }).catch(function(){});
          }, 2000);
        }
      }
      connect();
    },
    set: function(data){
      fetch(FB_URL + path + '.json', {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      }).catch(function(e){console.log('Firebase write error:', e);});
    },
    update: function(data){
      fetch(FB_URL + path + '.json', {
        method: 'PATCH',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      }).catch(function(){});
    }
  };
}

var wl=null;
async function reqWL(){try{if('wakeLock' in navigator){wl=await navigator.wakeLock.request('screen');}}catch(e){}}

/* ── AUDIO ── */
var _ac=null;
function gAC(){if(!_ac)try{_ac=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}if(_ac&&_ac.state==='suspended')try{_ac.resume()}catch(e){}return _ac;}
document.addEventListener('touchstart',function(){gAC();},{passive:true});
document.addEventListener('click',function(){gAC();},{passive:true});
function ting(){
  try{
    var ctx=gAC();if(!ctx)return;var now=ctx.currentTime;
    [[880,0.7],[1760,0.5],[2640,0.3],[3520,0.15]].forEach(function(pair){
      var freq=pair[0],vol=pair[1];
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.value=freq;
      g.gain.setValueAtTime(0,now);
      g.gain.linearRampToValueAtTime(vol,now+0.003);
      g.gain.exponentialRampToValueAtTime(0.001,now+3.0);
      o.start(now);o.stop(now+3.1);
    });
  }catch(e){}
}
function tingEnd(){ting();setTimeout(ting,1100);setTimeout(ting,2200);}

/* ── LIVE DURATION TIMER ── */
var durTimer=null,sessionStartTime=0;
function startDurTimer(){
  sessionStartTime=Date.now();
  stopDurTimer();
  durTimer=setInterval(function(){
    var sec=Math.floor((Date.now()-sessionStartTime)/1000);
    var h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;
    var dur=(h>0?String(h).padStart(2,'0')+':':'')+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    var el=document.getElementById('live-dur');if(el)el.textContent='⏱ '+dur;
    var el2=document.getElementById('live-dur-admin');if(el2&&el2.style.display!=='none')el2.textContent='⏱ '+dur;
  },1000);
}
function stopDurTimer(){if(durTimer){clearInterval(durTimer);durTimer=null;}}
async function toggleMic(){
  if(access!==ACC.ADMIN)return;
  if(!micOn){
    try{
      await loadAgora();
      agoraClient=AgoraRTC.createClient({mode:'live',codec:'vp8'});
      await agoraClient.setClientRole('host');
      await agoraClient.join(AGORA_APP_ID,AGORA_CHANNEL,null,null);
      agoraMicTrack=await AgoraRTC.createMicrophoneAudioTrack();
      await agoraClient.publish([agoraMicTrack]);
      micOn=true;
      db.ref('/session/voice').set(true);
      updateMicUI();
    }catch(e){alert('Microphone error: '+e.message);}
  } else {
    try{
      if(agoraMicTrack){agoraMicTrack.stop();agoraMicTrack.close();agoraMicTrack=null;}
      if(agoraClient){await agoraClient.leave();agoraClient=null;}
      micOn=false;
      db.ref('/session/voice').set(false);
      updateMicUI();
    }catch(e){}
  }
}

function updateMicUI(){
  var btn=document.getElementById('mic-btn');
  var lbl=document.getElementById('mic-label');
  var sub=document.getElementById('mic-sub');
  btn.className='mic-btn '+(micOn?'on':'off');
  lbl.textContent=micOn?t('micOn2'):t('micOff');
  sub.textContent=micOn?t('micOnSub'):t('micOffSub');
}

function loadAgora(){
  return new Promise(function(res,rej){
    if(window.AgoraRTC){res();return;}
    var s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/agora-rtc-sdk-ng@4.19.0/AgoraRTC_N.js';
    s.onload=res;s.onerror=function(){rej(new Error('Agora load failed'));};
    document.head.appendChild(s);
  });
}

/* ── MUREED: JOIN LIVE ── */
async function joinLive(){
  joinedLive=true;
  document.getElementById('live-banner').classList.remove('on');
  document.getElementById('live-active').style.display='block';
  document.getElementById('voice-bar').classList.add('on');
  document.getElementById('voice-bar-txt').textContent=t('joinedLive');
  startDurTimer();
  reqWL();
  // join agora as audience
  try{
    await loadAgora();
    var client=AgoraRTC.createClient({mode:'live',codec:'vp8'});
    await client.setClientRole('audience');
    await client.join(AGORA_APP_ID,AGORA_CHANNEL,null,null);
    client.on('user-published',function(user,mediaType){
      client.subscribe(user,mediaType).then(function(){
        if(mediaType==='audio'){user.audioTrack.play();}
      });
    });
    agoraJoined=true;
  }catch(e){console.log('Voice join failed:',e);}
  if(liveSession.current)showLiveItem(liveSession.current);
}

function updateLiveBanner(){
  var banner=document.getElementById('live-banner');
  /* Admin/Helper never see the Join banner — they are conducting */
  if(access>=ACC.HELPER){banner.classList.remove('on');return;}
  if(liveSession.active&&!joinedLive){
    banner.classList.add('on');
    document.getElementById('live-text').textContent=t('liveJoin');
    document.getElementById('live-sub').textContent=t('liveSub');
  } else if(!liveSession.active){
    banner.classList.remove('on');
    if(joinedLive){
      joinedLive=false;
      document.getElementById('live-active').style.display='none';
      document.getElementById('voice-bar').classList.remove('on');
      stopDurTimer();
      relWL();
    }
  }
}

  cdot.style.background=item.col;cdot.style.color=item.col;cdot.style.boxShadow='0 0 12px '+item.col;
  if(isL){
    document.getElementById('la-det').textContent=gNL(item)+' · '+gP(item);
    document.getElementById('la-ayat').textContent='';
    document.getElementById('la-ayat-ref').textContent='';
    document.getElementById('la-trans').textContent='';
  } else {
    document.getElementById('la-det').textContent=gD(item);
    if(item.ayat){
      document.getElementById('la-ayat').textContent=item.ayat.arabic;
      document.getElementById('la-ayat-ref').textContent='('+item.ayat.ref+')';
      document.getElementById('la-trans').textContent=gTr(item.ayat);
    } else {
      document.getElementById('la-ayat').textContent='';
      document.getElementById('la-ayat-ref').textContent='';
      document.getElementById('la-trans').textContent='';
    }
  }
  // highlight in personal list if visible
  document.querySelectorAll('.ir').forEach(function(r){r.classList.remove('live-current');});
  var row=document.getElementById('row-'+id);
  if(row){row.classList.add('live-current');row.scrollIntoView({behavior:'smooth',block:'nearest'});}
  ting();
}

/* ── LANG ── */
function setLang(l){lang=l;st.lang=l;svSt();applyLang();renderAll();if(access>=ACC.HELPER)renderAdminGrid();}

function applyLang(){
  var rtl=lang==='ur';document.body.style.direction=rtl?'rtl':'ltr';
  document.getElementById('ht').textContent=t('title');
  document.getElementById('hs').textContent=t('sub');
  document.getElementById('tbl').textContent=t('lataif');
  document.getElementById('tbm').textContent=t('muraqbat');
  document.getElementById('lsl').textContent=t('syncL');
  document.getElementById('lsm').textContent=t('syncM');
  document.getElementById('lruh').textContent=t('ruh');
  document.getElementById('lbody').textContent=t('body');
  document.getElementById('lsa').textContent=t('sal');
  document.getElementById('lda').textContent=t('daw');
  document.getElementById('lfu').textContent=t('fur');
  document.getElementById('lad').textContent=t('adv');
  document.getElementById('bb').textContent=t('begin');
  document.getElementById('lsel').value=lang;
  updT();
}

function swTab(x){
  document.getElementById('tbl').classList.toggle('active',x==='l');
  document.getElementById('tbm').classList.toggle('active',x==='m');
  document.getElementById('tl').classList.toggle('vis',x==='l');
  document.getElementById('tm').classList.toggle('vis',x==='m');
}

function renderAll(){
  rG('lr',LA.filter(function(l){return l.part==='ruh';}),'l');
  rG('lb',LA.filter(function(l){return l.part==='body';}),'l');
  rG('lsa2',MA.filter(function(m){return m.gr==='sal';}),'m');
  rG('lda2',MA.filter(function(m){return m.gr==='daw';}),'m');
  rG('lfu2',MA.filter(function(m){return m.gr==='fur';}),'m');
  rG('lad2',MA.filter(function(m){return m.gr==='adv';}),'m');
  updT();
}

function rG(cid,items,type){
  var el=document.getElementById(cid);if(!el)return;el.innerHTML='';
  items.forEach(function(item){
    var en=gE(item.id);
    var row=document.createElement('div');
    row.className='ir'+(en?'':' dis');row.id='row-'+item.id;
    var nameDiv=type==='l'
      ?'<div class="in">'+gN(item)+(lang==='en'?'<span class="iar">'+item.ar+'</span>':'')+'</div>'
      :'<div class="in">'+gN(item)+'</div>';
    row.innerHTML=
      '<div class="idot" style="background:'+item.col+';box-shadow:0 0 5px '+item.col+'66"></div>'+
      '<div class="ii" onclick="showInfo(\''+item.id+'\',\''+type+'\')">'+
        nameDiv+'<div class="isb">'+(type==='l'?item.lEn:item.dEn)+'</div>'+
      '</div>'+
      '<div class="ims">'+
        '<button class="mb" onclick="event.stopPropagation();chMin(\''+item.id+'\',\''+type+'\',-1)" '+(en?'':'disabled')+'>−</button>'+
        '<span class="mv" id="m-'+item.id+'">'+gMin(item.id,item.dm)+'</span>'+
        '<button class="mb" onclick="event.stopPropagation();chMin(\''+item.id+'\',\''+type+'\',1)" '+(en?'':'disabled')+'>+</button>'+
      '</div>'+
      '<div class="et2">'+
        '<input type="checkbox" id="e-'+item.id+'" '+(en?'checked':'')+' onchange="event.stopPropagation();togE(\''+item.id+'\',\''+type+'\',this.checked)">'+
        '<label for="e-'+item.id+'" onclick="event.stopPropagation()">'+(en?t('on'):t('off'))+'</label>'+
      '</div>';
    el.appendChild(row);
  });
}

function togE(id,type,val){st[id+'_e']=!!val;svSt();if(type==='l')document.getElementById('sl').checked=false;else document.getElementById('sm').checked=false;renderAll();}
function chMin(id,type,d){var def=type==='l'?LD.find(function(x){return x.id===id;}).dm:MD.find(function(x){return x.id===id;}).dm;var nv=Math.max(1,Math.min(99,gMin(id,def)+d));sMin(id,nv);var el=document.getElementById('m-'+id);if(el)el.textContent=nv;if(type==='l'&&document.getElementById('sl').checked){var f=LA.find(function(l){return gE(l.id);});if(f&&f.id===id)sLA(nv);}if(type==='m'&&document.getElementById('sm').checked){var f=MA.find(function(m){return gE(m.id);});if(f&&f.id===id)sMA(nv);}updT();}
function sLA(v){LA.filter(function(l){return gE(l.id);}).forEach(function(l){sMin(l.id,v);var e=document.getElementById('m-'+l.id);if(e)e.textContent=v;});updT();}
function sMA(v){MA.filter(function(m){return gE(m.id);}).forEach(function(m){sMin(m.id,v);var e=document.getElementById('m-'+m.id);if(e)e.textContent=v;});updT();}
function onSL(c){if(c){var f=LA.find(function(l){return gE(l.id);});if(f)sLA(gMin(f.id,f.dm));}}
function onSM(c){if(c){var f=MA.find(function(m){return gE(m.id);});if(f)sMA(gMin(f.id,f.dm));}}
function fC(d){var h=d.getHours(),m=d.getMinutes(),ap=h>=12?'PM':'AM';h=h%12||12;return h+':'+String(m).padStart(2,'0')+' '+ap;}
function updT(){var t1=LA.filter(function(l){return gE(l.id);}).reduce(function(a,l){return a+gMin(l.id,l.dm);},0);var t2=MA.filter(function(m){return gE(m.id);}).reduce(function(a,m){return a+gMin(m.id,m.dm);},0);var tot=t1+t2;var txt=t('total')+': <strong>'+tot+' min</strong>';if(tot>0)txt+=' &nbsp;·&nbsp; <span class="et">'+t('ends')+' '+fC(new Date(Date.now()+tot*60000))+'</span>';document.getElementById('tot').innerHTML=txt;}

/* ── PERSONAL SESSION ── */
function go(){
  var la=LA.filter(function(l){return gE(l.id);}).map(function(l){
    var o=LD.find(function(x){return x.id===l.id;});
    return Object.assign({},o,{_t:'l',mins:gMin(l.id,l.dm)});
  });
  var ma=MA.filter(function(m){return gE(m.id);}).map(function(m){
    var o=MD.find(function(x){return x.id===m.id;});
    return Object.assign({},o,{_t:'m',mins:gMin(m.id,m.dm)});
  });
  SI=la.concat(ma);
  if(!SI.length){alert('Please enable at least one item.');return;}
  document.getElementById('sv').style.display='none';
  document.getElementById('ssv').style.display='block';
  document.getElementById('ssh').textContent=t('title');
  ci=0;run=false;rSL();rDots();setSC();bI(0);reqWL();
}

function rSL(){var el=document.getElementById('sl2');el.innerHTML='';var pt=null;SI.forEach(function(item,i){if(item._t!==pt){var lbl=document.createElement('div');lbl.className='slbl';lbl.textContent=item._t==='l'?t('ll'):t('ml');el.appendChild(lbl);pt=item._t;}var row=document.createElement('div');row.className='ir'+(i===ci?' active':i<ci?' done':'');row.id='sr-'+i;row.innerHTML='<div class="idot" style="background:'+item.col+';box-shadow:0 0 5px '+item.col+'66"></div><div class="ii"><div class="in" style="font-size:12px">'+gN(item)+'</div></div><span style="font-size:11px;color:var(--text2)">'+item.mins+'m</span>';el.appendChild(row);});}
function rDots(){var el=document.getElementById('dots');el.innerHTML='';SI.forEach(function(item,i){var d=document.createElement('div');d.className='dot'+(i<ci?' done':'');d.id='sd-'+i;if(i===ci)d.style.background=item.col;el.appendChild(d);});}
function setSC(){document.getElementById('sc').innerHTML='<button class="sb" onclick="tP()" id="pb">'+t('pause')+'</button><button class="sb" onclick="skI()">'+t('skip')+'</button><button class="sb" onclick="eS()">'+t('end')+'</button>';}
function bI(idx){if(idx>=SI.length){finish();return;}ci=idx;var item=SI[idx];ts=item.mins*60;sleft=ts;startAt=Date.now();pausedAt=0;run=true;uTD();bldDC(item);rSL();rDots();if(TI)clearInterval(TI);TI=setInterval(tick,500);}
function tick(){if(!run)return;sleft=Math.max(0,ts-Math.floor((Date.now()-startAt)/1000));uTD();if(sleft<=0){clearInterval(TI);ting();setTimeout(function(){bI(ci+1);},1400);}}
function uTD(){var item=SI[ci];if(!item)return;document.getElementById('cn').textContent=gN(item)+'  ('+(ci+1)+'/'+SI.length+')';document.getElementById('ca').textContent=item.ar||'';if(item._t==='l'){document.getElementById('lcw').style.display='flex';var iW=item.id==='sirr';var lcd=document.getElementById('lcd');lcd.style.background=item.col;lcd.style.boxShadow='0 0 10px '+item.col+'99';lcd.style.border=iW?'1.5px solid rgba(255,255,255,0.6)':'none';document.getElementById('lcl').textContent=t('lc');document.getElementById('lcn').textContent=gNL(item);document.getElementById('lcn').style.color=iW?'#c0ccde':item.col;document.getElementById('pf').style.background=item.col;}else{document.getElementById('lcw').style.display='none';document.getElementById('pf').style.background='linear-gradient(90deg,var(--accent),var(--gold))';}var m=Math.floor(sleft/60),s=sleft%60;document.getElementById('clk').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');var pct=ts>0?((ts-sleft)/ts)*100:0;document.getElementById('pf').style.width=pct.toFixed(1)+'%';var el2=ts-sleft;document.getElementById('pl').textContent=Math.floor(el2/60)+'m '+(el2%60)+'s '+t('elapsed');var rem=sleft+SI.slice(ci+1).reduce(function(a,i){return a+i.mins*60;},0);document.getElementById('ed').textContent=t('ends')+' ~'+fC(new Date(Date.now()+rem*1000));var dot=document.getElementById('sd-'+ci);if(dot)dot.style.background=item.col;}
function tP(){run=!run;if(run){if(pausedAt>0){startAt+=Date.now()-pausedAt;pausedAt=0;}}else{pausedAt=Date.now();}document.getElementById('pb').textContent=run?t('pause'):t('resume');}
function skI(){clearInterval(TI);ting();setTimeout(function(){bI(ci+1);},700);}
function eS(){clearInterval(TI);finish();}

function bldDC(item){var dc=document.getElementById('dc');dc.style.display='block';dc.innerHTML=detailHTML(item,item._t);}
function detailHTML(item,type){var h='';if(type==='l'){var iW=item.id==='sirr';var circ='<div style="width:26px;height:26px;border-radius:50%;background:'+item.col+';flex-shrink:0;'+(iW?'border:1.5px solid rgba(255,255,255,0.5);':'')+'box-shadow:0 0 8px '+item.col+'88;margin-top:1px"></div>';h+=dRow(circ,t('lc'),'<span style="color:'+(iW?'#c0ccde':item.col)+';font-weight:600">'+gNL(item)+'</span>');h+=dRow(ico('#c8a030'),t('fp2'),gP(item));h+=dRow(ico('#4a80c0'),t('hv'),gH(item));}else{h+=dRow(ico(item.col),t('desc'),gD(item),true);if(item.ayat){h+='<div class="dr">'+ico('#d4a820')+'<div style="flex:1;min-width:0"><div class="dl">'+t('ay')+'</div><div class="ayr">'+item.ayat.arabic+'</div><div class="ayrf">('+item.ayat.ref+')</div><div class="dl" style="margin-top:6px">'+t('tr')+'</div><div class="ayt">'+gTr(item.ayat)+'</div></div></div>';}}return h;}
function ico(col){return '<div class="di" style="background:'+col+'22;color:'+col+'"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5" stroke="'+col+'" stroke-width="1.5"/><circle cx="7" cy="7" r="2" fill="'+col+'"/></svg></div>';}
function dRow(icon,lbl,val,sm){return '<div class="dr">'+icon+'<div style="flex:1;min-width:0"><div class="dl">'+lbl+'</div><div class="'+(sm?'dvsm':'dv')+'">'+val+'</div></div></div>';}

function finish(){clearInterval(TI);relWL();document.querySelector('.tc').style.display='none';document.getElementById('dc').style.display='none';document.getElementById('dots').style.display='none';document.getElementById('sl2').style.display='none';document.getElementById('sc').innerHTML='<button class="sb pr" onclick="rst()">'+t('newS')+'</button>';var f=document.getElementById('fin');f.style.display='block';document.getElementById('fh').textContent=t('finH');document.getElementById('fp').textContent=t('finP');document.getElementById('fq1').textContent=t('finQ1');document.getElementById('fq2').textContent=t('finQ2');tingEnd();}
function rst(){run=false;if(TI)clearInterval(TI);relWL();document.getElementById('ssv').style.display='none';document.getElementById('sv').style.display='block';document.querySelector('.tc').style.display='block';document.getElementById('dc').style.display='block';document.getElementById('dots').style.display='flex';document.getElementById('sl2').style.display='block';document.getElementById('fin').style.display='none';renderAll();}

function showInfo(id,type){var item=type==='l'?LD.find(function(x){return x.id===id;}):MD.find(function(x){return x.id===id;});if(!item)return;var iW=item.id==='sirr';var mdo=document.getElementById('mdo');mdo.style.background=item.col;mdo.style.boxShadow='0 0 8px '+item.col+'99';mdo.style.border=iW?'1.5px solid rgba(255,255,255,0.5)':'none';document.getElementById('mti').textContent=gN(item);document.getElementById('mar2').textContent=item.ar;var h=detailHTML(item,type);if(type==='l')h+=dRow(ico('#607080'),t('loc'),gL(item));document.getElementById('mb3').innerHTML=h;document.getElementById('mo').style.display='flex';}
function cmo(e){if(e.target===document.getElementById('mo'))document.getElementById('mo').style.display='none';}

function initFirebase(){
  try{
    db.ref('/session').on('value',function(snap){
      var d=snap.val()||{};
      liveSession.active=d.active===true;
      liveSession.current=d.current||null;
      liveSession.type=d.type||'maghrib';
      if(d.active&&d.startedAt&&sessionStartTime===0){
        sessionStartTime=d.startedAt;
      }
      if(!d.active){sessionStartTime=0;stopDurTimer();}
      updateLiveBanner();
      if(joinedLive&&liveSession.current)showLiveItem(liveSession.current);
      if(access>=ACC.HELPER)updateAdminUI();
    });
  }catch(e){console.log('Firebase init error:',e);}
}

/* Android back */
history.pushState(null,null,location.href);
window.addEventListener('popstate',function(){
  history.pushState(null,null,location.href);
  if(document.getElementById('mo').style.display!=='none'){document.getElementById('mo').style.display='none';return;}
  if(document.getElementById('ssv').style.display!=='none'){if(run){run=false;clearInterval(TI);}relWL();rst();return;}
  if(access>=ACC.HELPER&&document.getElementById('admin-panel').style.display!=='none'){document.getElementById('admin-panel').style.display='none';document.getElementById('personal-panel').style.display='block';}
});

/* Use window.onload — most reliable for Android WebView file:// protocol */
window.onload=function(){
  try{
    applyLang();
    renderAll();
    initFirebase();
  }catch(e){
    /* Show error visibly on screen for debugging */
    document.body.innerHTML+='<div style="position:fixed;top:0;left:0;right:0;background:red;color:white;padding:20px;font-size:14px;z-index:9999">ERROR: '+e.message+'</div>';
  }
};
